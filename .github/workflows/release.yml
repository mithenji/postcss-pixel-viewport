name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish, for example v0.1.0"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  RELEASE_REF: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Consumer smoke tests
        run: npm run test:smoke

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Publish
        run: npm publish --access public
